<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07060c">
<title>The Heart Journey — Official Trailer</title>
<style>
  html,body{margin:0;height:100%;background:#07060c;overflow:hidden;-webkit-tap-highlight-color:transparent}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#07060c;cursor:pointer;user-select:none;touch-action:manipulation}
  #wrap.hidecur{cursor:none}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges}
  #px{position:absolute;filter:saturate(1.08) contrast(1.03) brightness(1.01)}
  #fx{position:absolute;pointer-events:none}
  #ui{position:absolute;left:0;right:0;bottom:0;padding:12px 16px;display:flex;align-items:center;justify-content:flex-end;gap:12px;
      opacity:0;transition:opacity .45s;z-index:6;pointer-events:none;
      background:linear-gradient(transparent,rgba(4,3,10,.55))}
  #wrap.ui #ui{opacity:1;pointer-events:auto}
  button.ic{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.16);border-radius:9px;width:34px;height:34px;
       color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;padding:0}
  button.ic:hover{background:rgba(0,0,0,.65)}
  button.ic svg{display:block}
  #hint{position:absolute;bottom:7%;width:100%;text-align:center;color:rgba(255,235,225,.55);
        font:11px/1.6 'Segoe UI',system-ui,sans-serif;letter-spacing:.45em;text-transform:uppercase;
        opacity:0;transition:opacity 1.2s;pointer-events:none}
  #wrap.menu #hint{opacity:1;animation:bre 2.6s ease-in-out infinite}
  @keyframes bre{0%,100%{opacity:.35}50%{opacity:.9}}
  #end{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
       justify-content:flex-end;padding-bottom:12vh;z-index:8;pointer-events:none;text-align:center}
  #end.show{display:flex}
  #endT{font:700 clamp(24px,5.5vw,44px)/1.2 Georgia,'Palatino Linotype',serif;color:#fff2e4;
       text-shadow:0 0 22px rgba(255,90,130,.9),0 2px 10px rgba(0,0,0,.65)}
  #endS{margin-top:10px;font:500 clamp(12px,2.4vw,16px)/1.5 'Segoe UI',system-ui,sans-serif;
       color:rgba(255,231,220,.75);letter-spacing:.14em}
  #endB{margin-top:26px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  #endB button{pointer-events:auto;font:700 clamp(15px,3vw,21px)/1 'Segoe UI',system-ui,sans-serif;
       padding:15px 32px;border-radius:16px;border:none;cursor:pointer;min-height:52px;
       display:inline-flex;align-items:center;text-decoration:none}
  #btnAgain{background:linear-gradient(180deg,#ff7d9c,#e83e68);color:#fff;
       box-shadow:0 4px 22px rgba(255,90,130,.55);transition:transform .15s}
  #btnAgain:hover{transform:scale(1.07)}
  @media (pointer:coarse){ button.ic{width:44px;height:44px} }
</style>
</head>
<body>
<div id="wrap" class="menu">
  <canvas id="px" width="384" height="216"></canvas>
  <canvas id="fx"></canvas>
  <div id="hint">chạm để xem trailer</div>
  <div id="end">
    <div id="endT">The Heart Journey</div>
    <div id="endS">MỘT BỘ PHIM PIXEL · KHÔNG LỜI</div>
    <div id="endB">
      <button id="btnAgain">↻&nbsp; Xem lại trailer</button>
    </div>
  </div>
  <div id="ui">
    <button class="ic" id="bPause" title="Tạm dừng / Tiếp tục"></button>
    <button class="ic" id="bMute" title="Âm thanh"></button>
    <button class="ic" id="bFull" title="Toàn màn hình"></button>
  </div>
</div>
<script src="js/gfx.js"></script>
<script src="js/music.js"></script>
<script src="js/scenes1.js"></script>
<script src="js/scenes2.js"></script>
<script src="js/trailer.js"></script>
</body>
</html>
